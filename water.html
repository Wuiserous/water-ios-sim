<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realistic Gyro Water Simulation</title>

<style>
    body {
        margin: 0;
        background: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: sans-serif;
        overflow: hidden;
    }

    #container {
        position: relative;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        border-radius: 20px;
    }

    canvas {
        display: block;
        background: linear-gradient(to bottom, #2a2a2a, #111);
        border-radius: 20px;
        touch-action: none; /* Prevents scrolling when interacting on mobile */
    }

    button {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 14px 24px;
        font-size: 16px;
        font-weight: bold;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, #4da6ff, #0073e6);
        color: white;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0, 115, 230, 0.4);
        transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
        transform: translate(-50%, -52%);
        box-shadow: 0 6px 20px rgba(0, 115, 230, 0.6);
    }
    
    #hint {
        position: absolute;
        bottom: 20px;
        width: 100%;
        text-align: center;
        color: rgba(255, 255, 255, 0.3);
        font-size: 14px;
        pointer-events: none;
    }
</style>
</head>
<body>

<div id="container">
    <canvas id="c" width="350" height="500"></canvas>
    <button id="start">Enable Motion</button>
    <div id="hint">Drag left/right to slosh</div>
</div>

<script>
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");

    const W = canvas.width;
    const H = canvas.height;

    const points = 100; // Increased resolution for smoother curves
    let water = [];
    let flows = []; // Represents the horizontal movement/momentum of water
    const baseHeight = H * 0.55;

    // Initialize arrays
    for (let i = 0; i < points; i++) {
        water[i] = baseHeight;
        flows[i] = 0;
    }

    let tilt = 0;
    let targetTilt = 0;
    let usingDeviceOrientation = false;

    // --- Interaction & Sensors ---

    document.getElementById("start").onclick = async () => {
        if (typeof DeviceOrientationEvent !== "undefined" && typeof DeviceOrientationEvent.requestPermission === "function") {
            try {
                let p = await DeviceOrientationEvent.requestPermission();
                if (p === "granted") {
                    window.addEventListener("deviceorientation", handleOrientation);
                    usingDeviceOrientation = true;
                }
            } catch (e) {
                console.error(e);
            }
        } else {
            window.addEventListener("deviceorientation", handleOrientation);
            usingDeviceOrientation = true;
        }
        document.getElementById("start").style.display = "none";
    };

    function handleOrientation(e) {
        if (e.gamma === null) return;
        let gamma = e.gamma;
        // Clamp extreme angles
        if (gamma > 60) gamma = 60;
        if (gamma < -60) gamma = -60;
        targetTilt = -gamma * (Math.PI / 180);
    }

    // Desktop & Touch Fallback (Drag to tilt the cup)
    function handleDrag(e) {
        if (usingDeviceOrientation) return;
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let rect = canvas.getBoundingClientRect();
        let mx = clientX - rect.left - (rect.width / 2);
        // Map mouse position to a tilt angle
        targetTilt = -(mx / (rect.width / 2)) * (Math.PI / 3);
    }

    canvas.addEventListener("mousemove", (e) => { if (e.buttons > 0) handleDrag(e); });
    canvas.addEventListener("mousedown", handleDrag);
    canvas.addEventListener("touchmove", handleDrag);

    // --- Physics Engine ---

    function physics() {
        // Smooth out the tilt application (simulates the inertia of tilting the cup itself)
        tilt += (targetTilt - tilt) * 0.1;
        
        let dx = W / (points - 1);
        let target_dy = dx * Math.tan(tilt);

        // 1. Calculate Acceleration & Momentum (Shallow Water Equations)
        for (let i = 0; i < points - 1; i++) {
            let actual_dy = water[i + 1] - water[i];
            let force = target_dy - actual_dy;
            
            flows[i] += force * 0.04; // Gravity / Acceleration
            flows[i] *= 0.99;         // Dampening (High = sloshes longer)
        }

        // 2. Apply flows to update water column heights
        for (let i = 0; i < points; i++) {
            let flow_in = (i > 0) ? flows[i - 1] : 0;
            let flow_out = (i < points - 1) ? flows[i] : 0;
            
            water[i] += (flow_in - flow_out) * 0.5; // Time step
        }

        // 3. Surface Tension / Viscosity (Smooths high-frequency jitter, strictly volume preserving)
        for (let i = 0; i < points - 1; i++) {
            let diff = water[i + 1] - water[i];
            let tension = diff * 0.015;
            water[i] += tension;
            water[i + 1] -= tension;
        }

        // 4. Edge Meniscus (Water crawling up the glass edges slightly)
        water[0] -= 1.0;
        water[points - 1] -= 1.0;

        // 5. Strict Volume Conservation (Ensures the cup never magically empties or overfills)
        let currentArea = 0;
        for (let i = 0; i < points; i++) currentArea += water[i];
        
        let targetArea = baseHeight * points;
        let areaDiff = (targetArea - currentArea) / points;
        
        for (let i = 0; i < points; i++) {
            water[i] += areaDiff;
        }
    }

    // --- Rendering ---

    function draw() {
        ctx.clearRect(0, 0, W, H);

        // Water Path
        ctx.beginPath();
        ctx.moveTo(0, H);
        
        for (let i = 0; i < points; i++) {
            let x = i * (W / (points - 1));
            let y = water[i];
            ctx.lineTo(x, y);
        }
        
        ctx.lineTo(W, H);
        ctx.closePath();

        // 1. Main Water Body (Gradient)
        let grad = ctx.createLinearGradient(0, H * 0.2, 0, H);
        grad.addColorStop(0, "rgba(77, 166, 255, 0.95)");
        grad.addColorStop(1, "rgba(10, 80, 180, 0.95)");
        ctx.fillStyle = grad;
        ctx.fill();

        // 2. Surface Surface Highlight (Crisp top edge)
        ctx.beginPath();
        for (let i = 0; i < points; i++) {
            let x = i * (W / (points - 1));
            let y = water[i];
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
        ctx.lineWidth = 2.5;
        ctx.lineJoin = "round";
        ctx.stroke();

        // 3. Fake Depth / Refraction Line (Draws slightly below the surface)
        ctx.beginPath();
        for (let i = 0; i < points; i++) {
            let x = i * (W / (points - 1));
            let y = water[i];
            if (i === 0) ctx.moveTo(x, y + 5);
            else ctx.lineTo(x, y + 5);
        }
        ctx.strokeStyle = "rgba(255, 255, 255, 0.2)";
        ctx.lineWidth = 2;
        ctx.stroke();
    }

    function loop() {
        physics();
        draw();
        requestAnimationFrame(loop);
    }

    // Start simulation
    loop();

</script>

</body>
</html>
