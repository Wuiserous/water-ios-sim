<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>120Hz Reactive Fluid & Haptics</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            overflow: hidden;
            touch-action: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
        }

        /* 
         * UPGRADED METABALL FILTER 
         * Sharper contrast creates tighter surface tension and distinct, realistic droplets.
         */
        #fluid-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: #000;
            filter: blur(10px) contrast(35);
            z-index: 1;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background-color: transparent;
        }

        /* Glass reflections */
        #glass-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 70px rgba(255, 255, 255, 0.15);
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(0,0,0,0) 40%, rgba(255,255,255,0.02) 100%);
            border: 2px solid rgba(255,255,255,0.08);
            pointer-events: none;
            z-index: 5;
        }

        #ui {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(15px);
            transition: opacity 0.3s;
        }

        button {
            padding: 20px 45px;
            font-size: 24px;
            font-weight: 800;
            border-radius: 50px;
            border: none;
            background: #007aff;
            color: white;
            box-shadow: 0 10px 40px rgba(0, 122, 255, 0.6);
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.92); }
        
        .hint {
            margin-top: 20px;
            color: rgba(255,255,255,0.8);
            font-size: 15px;
            text-align: center;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<!-- Hidden Label & Switch for iOS Haptic Hack -->
<label id="haptic-label" style="position:absolute; left:-9999px; opacity: 0.01;">
    <input type="checkbox" switch id="haptic-switch">
</label>

<div id="fluid-layer">
    <canvas id="sim"></canvas>
</div>
<div id="glass-overlay"></div>

<div id="ui">
    <button id="btn-start">Pour Water</button>
    <div class="hint">Turn up media volume slightly<br>for Sub-Bass Haptics</div>
</div>

<script>
    /**
     * --- DUAL-ENGINE HAPTICS (Audio + Physical) ---
     * Bypasses iOS Safari's strict vibration blocking.
     */
    let audioCtx;
    const hapticLabel = document.getElementById('haptic-label');

    function initHaptics() {
        // Initialize Web Audio API for Sub-Bass vibration
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AudioContext();
        audioCtx.resume();
        
        // Initial wake-up bump
        triggerHaptic('heavy');
    }

    function triggerHaptic(type = 'light') {
        // 1. Standard API (Works on Android)
        if (navigator.vibrate) navigator.vibrate(type === 'heavy' ? 25 : 10);
        
        // 2. iOS Native Switch Hack
        if (hapticLabel) hapticLabel.click();

        // 3. WebAudio Sub-Bass Emitter (Simulates a physical Taptic thump on iOS)
        if (audioCtx && audioCtx.state === 'running') {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            // 40Hz is deep bass. The speaker diaphragm moves violently, shaking the phone.
            osc.type = 'sine';
            osc.frequency.setValueAtTime(type === 'heavy' ? 40 : 60, audioCtx.currentTime);
            
            // Fast attack/release envelope to sound like a "thud" instead of a "beep"
            const duration = type === 'heavy' ? 0.05 : 0.015;
            gain.gain.setValueAtTime(1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }
    }

    let lastImpactTime = 0;
    let lastFlowTime = 0;

    /**
     * --- 120Hz REACTIVE FLUID ENGINE ---
     */
    const canvas = document.getElementById('sim');
    const ctx = canvas.getContext('2d', { alpha: false });
    const ui = document.getElementById('ui');
    const btn = document.getElementById('btn-start');

    // Highly optimized density for fast 120Hz calculations
    const PARTICLES = 550;      
    const R = 9;                
    const SPACING = R * 2.2;    
    const SPACING_SQ = SPACING * SPACING;
    const COHESION_DIST = SPACING * 1.5; 
    const COHESION_SQ = COHESION_DIST * COHESION_DIST;
    const DRAW_R = R * 2.6;     

    let width, height;
    let particles = [];
    let grid =[];
    let cols, rows;
    let cellSize = COHESION_DIST;

    let targetGravityX = 0;
    let targetGravityY = 0.9;
    let gravityX = 0;
    let gravityY = 0.9;

    class Particle {
        constructor(id, x, y) {
            this.id = id;
            this.x = x; this.y = y;
            this.oldX = x; this.oldY = y;
            this.vx = 0; this.vy = 0;
        }
    }

    function initParticles() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        
        cols = Math.ceil(width / cellSize);
        rows = Math.ceil(height / cellSize);
        grid = new Array(cols * rows);
        for(let i = 0; i < grid.length; i++) grid[i] = [];

        particles =[];
        const spawnCols = Math.max(5, Math.floor(width / SPACING) - 3);
        const startX = (width - (spawnCols * SPACING)) / 2;
        const startY = 80; 

        for (let i = 0; i < PARTICLES; i++) {
            let x = startX + (i % spawnCols) * SPACING + (Math.random() - 0.5);
            let y = startY + Math.floor(i / spawnCols) * SPACING;
            particles.push(new Particle(i, x, y));
        }
    }

    window.addEventListener('resize', () => { if(particles.length > 0) initParticles(); });

    /**
     * --- PHYSICS UPDATE LOOP ---
     */
    function updatePhysics() {
        // High reactivity gravity (much faster response to phone tilt)
        gravityX += (targetGravityX - gravityX) * 0.4;
        gravityY += (targetGravityY - gravityY) * 0.4;

        let totalKineticEnergy = 0;
        let totalWallForce = 0;

        // 1. Movement & Global Forces
        for (let i = 0; i < PARTICLES; i++) {
            let p = particles[i];
            
            p.vx = p.x - p.oldX;
            p.vy = p.y - p.oldY;

            totalKineticEnergy += Math.abs(p.vx) + Math.abs(p.vy);

            // Tighter Wake/Sleep logic for instant rest
            if (p.vx * p.vx + p.vy * p.vy < 0.005) {
                p.vx = 0; p.vy = 0;
                p.oldX = p.x; p.oldY = p.y;
            }

            p.vx *= 0.9995; // Highly slippery glass
            p.vy *= 0.9995;
            
            p.vx += gravityX;
            p.vy += gravityY;
            
            p.oldX = p.x;
            p.oldY = p.y;
            p.x += p.vx;
            p.y += p.vy;
        }

        // 2. Spatial Grid
        for(let i = 0; i < grid.length; i++) grid[i].length = 0;
        for(let i = 0; i < PARTICLES; i++) {
            let p = particles[i];
            let cx = Math.floor(p.x / cellSize);
            let cy = Math.floor(p.y / cellSize);
            if (cx < 0) cx = 0; if (cx >= cols) cx = cols - 1;
            if (cy < 0) cy = 0; if (cy >= rows) cy = rows - 1;
            grid[cx + cy * cols].push(p);
        }

        // 3. Fluid Mechanics (Cohesion + Tighter Viscosity)
        for (let iter = 0; iter < 3; iter++) {
            for (let i = 0; i < PARTICLES; i++) {
                let p = particles[i];
                let cx = Math.floor(p.x / cellSize);
                let cy = Math.floor(p.y / cellSize);

                for (let nx = cx - 1; nx <= cx + 1; nx++) {
                    for (let ny = cy - 1; ny <= cy + 1; ny++) {
                        if (nx >= 0 && nx < cols && ny >= 0 && ny < rows) {
                            let cell = grid[nx + ny * cols];
                            for (let j = 0; j < cell.length; j++) {
                                let p2 = cell[j];
                                if (p.id < p2.id) { 
                                    let dx = p2.x - p.x;
                                    let dy = p2.y - p.y;
                                    let distSq = dx*dx + dy*dy;
                                    
                                    if (distSq > 0.0001 && distSq < COHESION_SQ) {
                                        let dist = Math.sqrt(distSq);
                                        let nxDir = dx / dist;
                                        let nyDir = dy / dist;

                                        if (dist < SPACING) {
                                            // INCOMPRESSIBILITY (Push Apart)
                                            let push = (SPACING - dist) * 0.48;
                                            p.x -= nxDir * push; p.y -= nyDir * push;
                                            p2.x += nxDir * push; p2.y += nyDir * push;

                                            // VISCOSITY (Reduces internal jitter)
                                            let visc = 0.15; 
                                            let vxDiff = (p.x - p.oldX) - (p2.x - p2.oldX);
                                            let vyDiff = (p.y - p.oldY) - (p2.y - p2.oldY);
                                            
                                            p.oldX += vxDiff * visc; p.oldY += vyDiff * visc;
                                            p2.oldX -= vxDiff * visc; p2.oldY -= vyDiff * visc;
                                        } 
                                        else {
                                            // SURFACE TENSION (Pull together into blobs)
                                            let pull = (dist - SPACING) * 0.04; 
                                            p.x += nxDir * pull; p.y += nyDir * pull;
                                            p2.x -= nxDir * pull; p2.y -= nyDir * pull;
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
            }
        }

        // 4. Boundary Engine
        for (let i = 0; i < PARTICLES; i++) {
            let p = particles[i];
            
            if (p.x <= R) { 
                p.x = R; p.oldX = p.x; 
                totalWallForce += Math.abs(p.vx); 
            }
            else if (p.x >= width - R) { 
                p.x = width - R; p.oldX = p.x; 
                totalWallForce += Math.abs(p.vx); 
            }
            
            if (p.y <= R) { 
                p.y = R; p.oldY = p.y; 
                totalWallForce += Math.abs(p.vy); 
            }
            else if (p.y >= height - R) { 
                p.y = height - R; p.oldY = p.y; 
                p.oldX = p.x - (p.x - p.oldX) * 0.2; // Slide friction
                totalWallForce += Math.abs(p.vy); 
            }
        }

        // 5. EMBEDDED DYNAMIC HAPTICS
        const now = Date.now();
        
        // Massive Splash
        if (totalWallForce > 450 && (now - lastImpactTime > 150)) {
            triggerHaptic('heavy');
            lastImpactTime = now;
        } 
        // Flowing / Rolling rumble
        else if (totalKineticEnergy > 3000 && (now - lastFlowTime > 90) && (now - lastImpactTime > 100)) {
            triggerHaptic('light');
            lastFlowTime = now;
        }
    }

    /**
     * --- RENDERING ---
     */
    function draw() {
        ctx.fillStyle = "#000000"; 
        ctx.fillRect(0, 0, width, height);

        // Water color. Melts together perfectly via CSS.
        ctx.fillStyle = "#0088ff"; 
        ctx.beginPath();
        for (let i = 0; i < PARTICLES; i++) {
            let p = particles[i];
            ctx.moveTo(p.x + DRAW_R, p.y); 
            ctx.arc(p.x, p.y, DRAW_R, 0, Math.PI * 2);
        }
        ctx.fill();
    }

    // Fixed 120Hz Timestep for ProMotion iPhones
    let lastTime = 0;
    let accumulator = 0;
    const TIME_STEP = 1000 / 120; // 120 physics calculations per second

    function loop(time) {
        let dt = time - lastTime;
        lastTime = time;
        if (dt > 50) dt = 50;

        accumulator += dt;
        while (accumulator >= TIME_STEP) {
            updatePhysics();
            accumulator -= TIME_STEP;
        }
        
        draw();
        requestAnimationFrame(loop);
    }

    /**
     * --- STARTUP ---
     */
    btn.addEventListener('click', () => {
        initHaptics();

        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            DeviceMotionEvent.requestPermission()
                .then(state => {
                    if (state === 'granted') startSimulation();
                    else alert('Motion access denied.');
                })
                .catch(err => alert('Error: ' + err));
        } else {
            startSimulation();
        }
    });

    function startSimulation() {
        ui.style.opacity = "0";
        setTimeout(() => ui.style.display = "none", 300);
        
        initParticles();
        requestAnimationFrame((t) => { lastTime = t; loop(t); });

        // Map sensor directly for extreme reactivity
        window.addEventListener("devicemotion", (e) => {
            let acc = e.accelerationIncludingGravity;
            if (acc) {
                // Increased weight (0.5) makes it fall and splash much harder
                const weight = 0.5; 
                targetGravityX = acc.x * weight; 
                targetGravityY = -acc.y * weight; 
            }
        });
    }
</script>
</body>
</html>
