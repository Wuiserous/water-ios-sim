<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Real Water Physics & Haptics</title>
    <style>
        body {
            margin: 0;
            background-color: #030303;
            overflow: hidden;
            touch-action: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
        }

        #glass-container {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 50%, #151515 0%, #000000 100%);
        }

        /* Simulates looking inside a glass cup */
        #glass-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 50px rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.04);
            pointer-events: none;
            z-index: 5;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* The Button UI */
        #ui {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(15px);
            transition: opacity 0.4s;
        }

        button {
            padding: 20px 40px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, #007aff, #005bb5);
            color: white;
            box-shadow: 0 10px 40px rgba(0, 122, 255, 0.5);
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.92); }
        
        .hint {
            margin-top: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }

        /* 
         * THE IOS HAPTIC HACK 
         * This hidden switch triggers native iOS system haptics when clicked programmatically.
         */
        .ios-haptic-switch {
            position: absolute;
            opacity: 0;
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body>

<!-- The invisible trigger for iOS Safari Web Haptics -->
<input type="checkbox" switch id="ios-haptic-hack" class="ios-haptic-switch">

<div id="glass-container">
    <canvas id="sim"></canvas>
    <div id="glass-overlay"></div>
</div>

<div id="ui">
    <button id="btn-start">Fill Cup</button>
    <div class="hint">Ensure Silent Mode is OFF for Haptics</div>
</div>

<script>
    const canvas = document.getElementById('sim');
    const ctx = canvas.getContext('2d', { alpha: false });
    const ui = document.getElementById('ui');
    const btn = document.getElementById('btn-start');

    // --- HAPTICS ENGINE ---
    // This perfectly mimics the web-haptics NPM package without relying on external CDNs
    let lastSplashTime = 0;
    let lastFlowTime = 0;

    function performHaptic(intensity, duration) {
        // Standard Android API
        if (navigator.vibrate) {
            navigator.vibrate(duration);
        }

        // iOS 17+ Hack (Clicks the hidden switch)
        const iosSwitch = document.getElementById('ios-haptic-hack');
        if (iosSwitch) {
            iosSwitch.click(); // Trigger system physical click
            
            // If it's a heavy splash, click it again slightly after to create a deep "thud"
            if (intensity === 'heavy') {
                setTimeout(() => iosSwitch.click(), 30);
            }
        }
    }

    // --- FLUID CONFIGURATION ---
    const PARTICLES = 800;      // Detailed volume
    const R = 7;                // Molecule collision radius
    const SPACING = R * 2;
    const SPACING_SQ = SPACING * SPACING;
    const DRAW_R = R * 1.8;     // Draw slightly larger to blur edges together

    let width, height;
    let particles = [];
    let grid =[];
    let cols, rows;
    let cellSize = SPACING * 1.2;

    // Gravity Dynamics
    let targetGravityX = 0;
    let targetGravityY = 0.8;
    let gravityX = 0;
    let gravityY = 0.8;

    class Particle {
        constructor(id, x, y) {
            this.id = id;
            this.x = x;
            this.y = y;
            this.oldX = x;
            this.oldY = y;
            this.vx = 0;
            this.vy = 0;
        }
    }

    function initParticles() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        
        cols = Math.ceil(width / cellSize);
        rows = Math.ceil(height / cellSize);
        grid = new Array(cols * rows);
        for(let i = 0; i < grid.length; i++) grid[i] = [];

        particles =[];
        const spawnCols = 25;
        const startX = width / 2 - (spawnCols * SPACING) / 2;
        
        // Spawn the water high up so it visibly "drops" into the cup on start
        const startY = 50; 

        for (let i = 0; i < PARTICLES; i++) {
            let x = startX + (i % spawnCols) * SPACING + (Math.random() - 0.5);
            let y = startY + Math.floor(i / spawnCols) * SPACING;
            particles.push(new Particle(i, x, y));
        }
    }

    window.addEventListener('resize', () => { 
        if(particles.length > 0) {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            cols = Math.ceil(width / cellSize);
            rows = Math.ceil(height / cellSize);
            grid = new Array(cols * rows);
            for(let i = 0; i < grid.length; i++) grid[i] =[];
        }
    });

    // --- PHYSICS ENGINE ---
    function updatePhysics() {
        gravityX += (targetGravityX - gravityX) * 0.15;
        gravityY += (targetGravityY - gravityY) * 0.15;

        let totalKineticEnergy = 0;
        let totalWallForce = 0;

        // 1. Integration (Move particles)
        for (let i = 0; i < PARTICLES; i++) {
            let p = particles[i];
            
            p.vx = p.x - p.oldX;
            p.vy = p.y - p.oldY;

            totalKineticEnergy += Math.abs(p.vx) + Math.abs(p.vy);

            // STATIC FRICTION (Sleep Algorithm)
            // Fixes the boiling/jittering when phone is held perfectly still in portrait
            if (p.vx * p.vx + p.vy * p.vy < 0.02) {
                p.vx = 0; 
                p.vy = 0;
                p.oldX = p.x; 
                p.oldY = p.y;
            }

            p.vx *= 0.999; // Air resistance
            p.vy *= 0.999;
            
            p.vx += gravityX;
            p.vy += gravityY;
            
            p.oldX = p.x;
            p.oldY = p.y;
            p.x += p.vx;
            p.y += p.vy;
        }

        // 2. Spatial Grid Hashing
        for(let i = 0; i < grid.length; i++) grid[i].length = 0;
        for(let i = 0; i < PARTICLES; i++) {
            let p = particles[i];
            let cx = Math.floor(p.x / cellSize);
            let cy = Math.floor(p.y / cellSize);
            
            // Safety bounds for the grid
            if (cx < 0) cx = 0; if (cx >= cols) cx = cols - 1;
            if (cy < 0) cy = 0; if (cy >= rows) cy = rows - 1;
            
            grid[cx + cy * cols].push(p);
        }

        // 3. Fluid Viscoelastic Constraints
        for (let iter = 0; iter < 3; iter++) {
            for (let i = 0; i < PARTICLES; i++) {
                let p = particles[i];
                let cx = Math.floor(p.x / cellSize);
                let cy = Math.floor(p.y / cellSize);

                for (let nx = cx - 1; nx <= cx + 1; nx++) {
                    for (let ny = cy - 1; ny <= cy + 1; ny++) {
                        if (nx >= 0 && nx < cols && ny >= 0 && ny < rows) {
                            let cell = grid[nx + ny * cols];
                            for (let j = 0; j < cell.length; j++) {
                                let p2 = cell[j];
                                if (p.id < p2.id) { 
                                    let dx = p2.x - p.x;
                                    let dy = p2.y - p.y;
                                    let distSq = dx*dx + dy*dy;
                                    
                                    if (distSq > 0.0001 && distSq < SPACING_SQ) {
                                        let dist = Math.sqrt(distSq);
                                        let overlap = SPACING - dist;
                                        
                                        // PUSH APART
                                        let push = (overlap / dist) * 0.45;
                                        let px = dx * push;
                                        let py = dy * push;
                                        
                                        p.x -= px; p.y -= py;
                                        p2.x += px; p2.y += py;

                                        // VISCOSITY: Forces molecules to share momentum (thick fluid feel)
                                        let vxDiff = (p.x - p.oldX) - (p2.x - p2.oldX);
                                        let vyDiff = (p.y - p.oldY) - (p2.y - p2.oldY);
                                        let visc = 0.15; 
                                        
                                        p.oldX += vxDiff * visc; p.oldY += vyDiff * visc;
                                        p2.oldX -= vxDiff * visc; p2.oldY -= vyDiff * visc;
                                    }
                                }
                            }
                        }
                    }
                }
            }
        }

        // 4. Wall Collisions & Splash Impact Measurement
        for (let i = 0; i < PARTICLES; i++) {
            let p = particles[i];
            let hit = false;
            let bounce = 0.2; 

            if (p.x <= R) { p.x = R; p.oldX = p.x + p.vx * bounce; hit = true; totalWallForce += Math.abs(p.vx); }
            if (p.x >= width - R) { p.x = width - R; p.oldX = p.x + p.vx * bounce; hit = true; totalWallForce += Math.abs(p.vx); }
            if (p.y <= R) { p.y = R; p.oldY = p.y + p.vy * bounce; hit = true; totalWallForce += Math.abs(p.vy); }
            if (p.y >= height - R) { p.y = height - R; p.oldY = p.y + p.vy * bounce; hit = true; totalWallForce += Math.abs(p.vy); }
        }

        // 5. EVALUATE HAPTIC FEEDBACK
        const now = Date.now();
        
        // A. Heavy Splashing (When water violently hits the boundaries)
        if (totalWallForce > 400 && (now - lastSplashTime > 150)) {
            performHaptic('heavy', 35); // Sharp thud
            lastSplashTime = now;
        } 
        else if (totalWallForce > 150 && (now - lastSplashTime > 100)) {
            performHaptic('medium', 15); // Standard bump
            lastSplashTime = now;
        }
        
        // B. Gentle Flowing (When a large mass of water is sliding around smoothly)
        if (totalKineticEnergy > 2000 && (now - lastFlowTime > 80)) {
            performHaptic('light', 5); // Rolling rumble
            lastFlowTime = now;
        }
    }

    // --- RENDERING ---
    function draw() {
        ctx.fillStyle = "#050505"; 
        ctx.fillRect(0, 0, width, height);

        // Render Water (Base Glow)
        ctx.fillStyle = "rgba(0, 130, 255, 0.45)";
        ctx.beginPath();
        for (let i = 0; i < PARTICLES; i++) {
            let p = particles[i];
            ctx.moveTo(p.x + DRAW_R, p.y); 
            ctx.arc(p.x, p.y, DRAW_R, 0, Math.PI * 2);
        }
        ctx.fill();

        // Render Water (Inner Core)
        ctx.fillStyle = "rgba(100, 200, 255, 0.4)";
        ctx.beginPath();
        for (let i = 0; i < PARTICLES; i++) {
            let p = particles[i];
            ctx.moveTo(p.x + R, p.y); 
            ctx.arc(p.x, p.y, R, 0, Math.PI * 2);
        }
        ctx.fill();
    }

    let lastTime = 0;
    let accumulator = 0;
    const TIME_STEP = 1000 / 60;

    function loop(time) {
        let dt = time - lastTime;
        lastTime = time;
        if (dt > 100) dt = 100;

        accumulator += dt;
        while (accumulator >= TIME_STEP) {
            updatePhysics();
            accumulator -= TIME_STEP;
        }
        
        draw();
        requestAnimationFrame(loop);
    }

    // --- STARTUP & DEVICE SENSORS ---
    btn.addEventListener('click', () => {
        // We use standard Promise `.then()` to avoid macro-task delays that break iOS permissions
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            DeviceMotionEvent.requestPermission()
                .then(permissionState => {
                    if (permissionState === 'granted') {
                        startSimulation();
                    } else {
                        alert('Permission to access device motion was denied.');
                    }
                })
                .catch(err => {
                    alert('Error requesting motion access: ' + err);
                });
        } else {
            // Android / Non-iOS
            startSimulation();
        }
    });

    function startSimulation() {
        ui.style.opacity = "0";
        setTimeout(() => ui.style.display = "none", 400);
        
        // Initial Haptic Ping to wake up the engine
        performHaptic('heavy', 20);
        
        initParticles();
        requestAnimationFrame((t) => { lastTime = t; loop(t); });

        // Map physical accelerometer to canvas gravity
        window.addEventListener("devicemotion", (e) => {
            let acc = e.accelerationIncludingGravity;
            if (acc) {
                const weight = 0.28; // Tuning the "heaviness" of the water
                targetGravityX = acc.x * weight; 
                targetGravityY = -acc.y * weight; // Negative because Canvas Y goes down, but iOS upright Y goes down
            }
        });
    }
</script>
</body>
</html>
