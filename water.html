<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>60FPS Realistic Water</title>
    <style>
        body {
            margin: 0;
            background-color: #050505;
            overflow: hidden;
            touch-action: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
        }

        #glass-container {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000000 100%);
        }

        /* Simulates the look of looking inside a phone/glass cup */
        #glass-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 40px rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.05);
            pointer-events: none;
            z-index: 5;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #ui {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            transition: opacity 0.3s;
        }

        button {
            padding: 20px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.2);
            background: linear-gradient(135deg, #007aff, #005bb5);
            color: white;
            box-shadow: 0 10px 30px rgba(0, 122, 255, 0.4);
            cursor: pointer;
        }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div id="glass-container">
    <canvas id="sim"></canvas>
    <div id="glass-overlay"></div>
</div>

<div id="ui">
    <button id="btn-start">Fill Cup with Water</button>
</div>

<!-- Import web-haptics dynamically -->
<script type="module">
    // Load the NPM package gracefully via CDN
    let hapticLib = null;
    import('https://unpkg.com/web-haptics').then(module => {
        hapticLib = module.default || module.Haptics || module;
        console.log("web-haptics loaded successfully");
    }).catch(e => {
        console.warn("Failed to load web-haptics, falling back to native navigator.vibrate");
    });

    let lastHaptic = 0;
    window.triggerHaptic = function(force) {
        const now = Date.now();
        if (now - lastHaptic < 80) return; // Prevent buzzing (debounce)
        lastHaptic = now;

        let intensity = force > 300 ? 'heavy' : force > 150 ? 'medium' : 'light';

        if (hapticLib && typeof hapticLib.impact === 'function') {
            hapticLib.impact(intensity);
        } else if (navigator.vibrate) {
            navigator.vibrate(intensity === 'heavy' ? 20 : intensity === 'medium' ? 10 : 5);
        }
    };
</script>

<script>
/**
 * 60FPS VERLET FLUID PHYSICS ENGINE
 */
const canvas = document.getElementById('sim');
const ctx = canvas.getContext('2d', { alpha: false }); // Optimize rendering
const ui = document.getElementById('ui');
const btn = document.getElementById('btn-start');

// Fluid Config
const PARTICLES = 350;     // Perfect amount for an iPhone screen volume
const R = 18;              // Physics interaction radius
const DRAW_R = 14;         // Visual size (slightly smaller to overlap cleanly)
const R_SQ = R * R;
const R_COHESION = R_SQ * 2.25; // How far water pulls on itself (Surface tension)

let width, height;
let particles = [];
let grid =[];
let cols, rows;
let cellSize = R * 1.5;

// Gravity Variables
let targetGravityX = 0;
let targetGravityY = 0.5; // Default resting gravity (down)
let gravityX = 0;
let gravityY = 0.5;

class Particle {
    constructor(id, x, y) {
        this.id = id;
        this.x = x;
        this.y = y;
        this.oldX = x;
        this.oldY = y;
        this.vx = 0;
        this.vy = 0;
    }
}

function init() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    
    cols = Math.ceil(width / cellSize);
    rows = Math.ceil(height / cellSize);
    grid = new Array(cols * rows);
    for(let i = 0; i < grid.length; i++) grid[i] = [];

    particles =[];
    const spawnCols = 15;
    const startX = width / 2 - (spawnCols * R);
    const startY = height - (Math.ceil(PARTICLES / spawnCols) * R * 2) - 50;

    for (let i = 0; i < PARTICLES; i++) {
        let x = startX + (i % spawnCols) * (R * 1.5) + (Math.random() * 2);
        let y = startY + Math.floor(i / spawnCols) * (R * 1.5);
        particles.push(new Particle(i, x, y));
    }
}

window.addEventListener('resize', () => { if(particles.length > 0) init(); });

// --- Physics Step ---
function updatePhysics() {
    // 1. Smooth Gravity Mapping
    gravityX += (targetGravityX - gravityX) * 0.1;
    gravityY += (targetGravityY - gravityY) * 0.1;

    // 2. Integration (Verlet) & Bounds
    for (let i = 0; i < PARTICLES; i++) {
        let p = particles[i];
        
        // Add gravity to velocity
        p.vx += gravityX;
        p.vy += gravityY;
        
        // Predict next position
        let nx = p.x + p.vx;
        let ny = p.y + p.vy;
        
        p.oldX = p.x;
        p.oldY = p.y;
        p.x = nx;
        p.y = ny;
        
        // Fast wall bounds
        if (p.x < R) p.x = R;
        if (p.x > width - R) p.x = width - R;
        if (p.y < R) p.y = R;
        if (p.y > height - R) p.y = height - R;
    }

    // 3. Clear and Populate Spatial Hash Grid
    for(let i = 0; i < grid.length; i++) grid[i].length = 0;
    
    for(let i = 0; i < PARTICLES; i++) {
        let p = particles[i];
        let cx = Math.floor(p.x / cellSize);
        let cy = Math.floor(p.y / cellSize);
        if (cx >= 0 && cx < cols && cy >= 0 && cy < rows) {
            grid[cx + cy * cols].push(p);
        }
    }

    // 4. Solve Viscoelastic Constraints (Runs 2x for stiffness)
    for (let iter = 0; iter < 2; iter++) {
        for (let i = 0; i < PARTICLES; i++) {
            let p = particles[i];
            let cx = Math.floor(p.x / cellSize);
            let cy = Math.floor(p.y / cellSize);

            // Check neighbor cells
            for (let nx = cx - 1; nx <= cx + 1; nx++) {
                for (let ny = cy - 1; ny <= cy + 1; ny++) {
                    if (nx >= 0 && nx < cols && ny >= 0 && ny < rows) {
                        let cell = grid[nx + ny * cols];
                        for (let j = 0; j < cell.length; j++) {
                            let p2 = cell[j];
                            if (p.id < p2.id) { // Avoid double-checking pairs
                                let dx = p2.x - p.x;
                                let dy = p2.y - p.y;
                                let distSq = dx*dx + dy*dy;
                                
                                // Are they close enough to interact?
                                if (distSq < R_COHESION) {
                                    let dist = Math.sqrt(distSq);
                                    if (dist === 0) continue;
                                    let dirX = dx / dist;
                                    let dirY = dy / dist;
                                    
                                    if (dist < R) {
                                        // Incompressible (Push Apart)
                                        let overlap = (R - dist) * 0.5;
                                        p.x -= dirX * overlap; p.y -= dirY * overlap;
                                        p2.x += dirX * overlap; p2.y += dirY * overlap;
                                    } else {
                                        // Surface Tension / Cohesion (Pull together)
                                        let pull = (dist - R) * 0.025; 
                                        p.x += dirX * pull; p.y += dirY * pull;
                                        p2.x -= dirX * pull; p2.y -= dirY * pull;
                                    }
                                }
                            }
                        }
                    }
                }
            }
        }
    }

    // 5. Finalize Velocities and Detect Splashes (Haptics)
    let frameImpact = 0;
    for (let i = 0; i < PARTICLES; i++) {
        let p = particles[i];
        
        let hit = false;
        let bounce = 0.2; // Dead bounce, water sticks to walls

        if (p.x <= R) { p.x = R; p.oldX = p.x + p.vx * bounce; hit = true; }
        if (p.x >= width - R) { p.x = width - R; p.oldX = p.x + p.vx * bounce; hit = true; }
        if (p.y <= R) { p.y = R; p.oldY = p.y + p.vy * bounce; hit = true; }
        if (p.y >= height - R) { p.y = height - R; p.oldY = p.y + p.vy * bounce; hit = true; }
        
        // Derive velocity from updated positions
        p.vx = (p.x - p.oldX) * 0.99; // 0.99 preserves momentum (slippery)
        p.vy = (p.y - p.oldY) * 0.99;
        
        // Accumulate impact force if hitting walls
        if (hit) frameImpact += Math.abs(p.vx) + Math.abs(p.vy);
    }

    // If total mass of water hitting the wall is large enough, trigger vibration
    if (frameImpact > 100 && window.triggerHaptic) {
        window.triggerHaptic(frameImpact);
    }
}

// --- Rendering Step ---
function draw() {
    ctx.fillStyle = "#111"; // Background
    ctx.fillRect(0, 0, width, height);

    // Draw Water
    ctx.fillStyle = "#0088ff";
    ctx.beginPath();
    for (let i = 0; i < PARTICLES; i++) {
        let p = particles[i];
        // move to radius edge so paths don't connect across the screen
        ctx.moveTo(p.x + DRAW_R, p.y); 
        ctx.arc(p.x, p.y, DRAW_R, 0, Math.PI * 2);
    }
    ctx.fill();

    // Adding this faint stroke creates a cohesive "caustics/bubble" texture 
    // when particles overlap
    ctx.strokeStyle = "rgba(255, 255, 255, 0.15)";
    ctx.lineWidth = 1.5;
    ctx.stroke();
}

// Fixed timestep loop for perfect consistency on 60hz & 120hz displays
let lastTime = 0;
let accumulator = 0;
const TIME_STEP = 1000 / 60;

function loop(time) {
    let dt = time - lastTime;
    lastTime = time;
    if (dt > 100) dt = 100; // prevent spiral of death if tab is backgrounded

    accumulator += dt;
    while (accumulator >= TIME_STEP) {
        updatePhysics();
        accumulator -= TIME_STEP;
    }
    
    draw();
    requestAnimationFrame(loop);
}

// --- Sensors & Startup ---
btn.onclick = async () => {
    if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
        try {
            const permissionState = await DeviceMotionEvent.requestPermission();
            if (permissionState === 'granted') {
                startSim();
            } else {
                alert("Motion permission denied. It will not work.");
            }
        } catch (e) {
            alert("Error: " + e);
        }
    } else {
        startSim();
    }
};

function startSim() {
    ui.style.opacity = "0";
    setTimeout(() => ui.style.display = "none", 300);
    
    init();
    requestAnimationFrame((t) => { lastTime = t; loop(t); });

    window.addEventListener("devicemotion", (e) => {
        let acc = e.accelerationIncludingGravity;
        if (acc) {
            // iOS W3C mapping:
            // Tilting Right (right edge down): acc.x is positive -> Water falls Right (+X)
            // Upright (bottom edge down): acc.y is negative -> Water falls Down (+Y)
            const gScale = 0.15; // Tuning factor for weight
            targetGravityX = acc.x * gScale; 
            targetGravityY = -acc.y * gScale; 
        }
    });
}
</script>
</body>
</html>
