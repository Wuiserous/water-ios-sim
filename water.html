<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Realistic Water Physics & Haptics</title>
    <style>
        body {
            margin: 0;
            background-color: #030303;
            overflow: hidden;
            touch-action: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
        }

        #glass-container {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 50%, #111111 0%, #000000 100%);
        }

        /* Simulates looking inside a glass cup */
        #glass-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 50px rgba(255,255,255,0.06);
            border: 2px solid rgba(255,255,255,0.03);
            pointer-events: none;
            z-index: 5;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* The Button UI */
        #ui {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(15px);
            transition: opacity 0.4s;
        }

        button {
            padding: 20px 45px;
            font-size: 22px;
            font-weight: 700;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, #007aff, #005bb5);
            color: white;
            box-shadow: 0 10px 40px rgba(0, 122, 255, 0.4);
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.92); }
        
        .hint {
            margin-top: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }
    </style>
</head>
<body>

<div id="glass-container">
    <canvas id="sim"></canvas>
    <div id="glass-overlay"></div>
</div>

<div id="ui">
    <button id="btn-start">Fill Cup</button>
    <div class="hint">Ensure Silent Mode is OFF for Haptics</div>
</div>

<script>
    /**
     * --- THE WEB-HAPTICS ENGINE (Standalone Hack) ---
     * This perfectly mimics the web-haptics library from the video without needing NPM.
     * It uses the iOS 17 <input switch> hack to force the system Taptic Engine.
     */
    const hapticLabel = document.createElement('label');
    hapticLabel.style.position = 'absolute';
    hapticLabel.style.left = '-9999px';
    hapticLabel.style.top = '-9999px';
    hapticLabel.style.opacity = '0.01'; // Hidden but renderable
    hapticLabel.style.pointerEvents = 'none';

    const hapticInput = document.createElement('input');
    hapticInput.type = 'checkbox';
    hapticInput.setAttribute('switch', ''); // The magic iOS 17 attribute

    hapticLabel.appendChild(hapticInput);
    document.body.appendChild(hapticLabel);

    function fireHapticTick() {
        // Standard Android Web Vibrate API
        if (navigator.vibrate) {
            navigator.vibrate(15);
        }
        // iOS Hack: Simulating a user click on the hidden switch triggers the physical Taptic bump
        hapticLabel.click(); 
    }

    let lastSplashTime = 0;


    /**
     * --- FLUID PHYSICS CONFIGURATION ---
     */
    const canvas = document.getElementById('sim');
    const ctx = canvas.getContext('2d', { alpha: false });
    const ui = document.getElementById('ui');
    const btn = document.getElementById('btn-start');

    const PARTICLES = 850;      
    const R = 7;                // Molecule size
    const SPACING = R * 2;
    const SPACING_SQ = SPACING * SPACING;
    const DRAW_R = R * 1.9;     // Render slightly larger to fuse the liquid together

    let width, height;
    let particles =[];
    let grid =[];
    let cols, rows;
    let cellSize = SPACING * 1.5;

    // Gravity Dynamics
    let targetGravityX = 0;
    let targetGravityY = 0.8;
    let gravityX = 0;
    let gravityY = 0.8;

    class Particle {
        constructor(id, x, y) {
            this.id = id;
            this.x = x;
            this.y = y;
            this.oldX = x;
            this.oldY = y;
            this.vx = 0;
            this.vy = 0;
        }
    }

    function initParticles() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        
        cols = Math.ceil(width / cellSize);
        rows = Math.ceil(height / cellSize);
        grid = new Array(cols * rows);
        for(let i = 0; i < grid.length; i++) grid[i] = [];

        particles =[];
        // Dynamically size the fluid block to fit perfectly inside the phone screen
        const spawnCols = Math.max(5, Math.floor(width / SPACING) - 2);
        const startX = (width - (spawnCols * SPACING)) / 2;
        
        // Spawn high up so it visibly "drops" into the cup and creates an initial haptic splash
        const startY = 50; 

        for (let i = 0; i < PARTICLES; i++) {
            let x = startX + (i % spawnCols) * SPACING + (Math.random() - 0.5);
            let y = startY + Math.floor(i / spawnCols) * SPACING;
            particles.push(new Particle(i, x, y));
        }
    }

    window.addEventListener('resize', () => { 
        if(particles.length > 0) initParticles();
    });

    /**
     * --- PHYSICS ENGINE LOOP ---
     */
    function updatePhysics() {
        // Inertia smoothing (liquid sloshes behind slightly)
        gravityX += (targetGravityX - gravityX) * 0.15;
        gravityY += (targetGravityY - gravityY) * 0.15;

        let totalWallForce = 0;

        // 1. Integration (Move particles)
        for (let i = 0; i < PARTICLES; i++) {
            let p = particles[i];
            
            p.vx = p.x - p.oldX;
            p.vy = p.y - p.oldY;

            // Global Friction
            p.vx *= 0.999; 
            p.vy *= 0.999;
            
            p.vx += gravityX;
            p.vy += gravityY;
            
            p.oldX = p.x;
            p.oldY = p.y;
            p.x += p.vx;
            p.y += p.vy;
        }

        // 2. Spatial Grid Hashing (Optimizes calculations)
        for(let i = 0; i < grid.length; i++) grid[i].length = 0;
        for(let i = 0; i < PARTICLES; i++) {
            let p = particles[i];
            let cx = Math.floor(p.x / cellSize);
            let cy = Math.floor(p.y / cellSize);
            
            // Safety clamp bounds
            if (cx < 0) cx = 0; if (cx >= cols) cx = cols - 1;
            if (cy < 0) cy = 0; if (cy >= rows) cy = rows - 1;
            
            grid[cx + cy * cols].push(p);
        }

        // 3. Fluid Viscoelastic Constraints (Runs 3x for solid stacking)
        for (let iter = 0; iter < 3; iter++) {
            for (let i = 0; i < PARTICLES; i++) {
                let p = particles[i];
                let cx = Math.floor(p.x / cellSize);
                let cy = Math.floor(p.y / cellSize);

                for (let nx = cx - 1; nx <= cx + 1; nx++) {
                    for (let ny = cy - 1; ny <= cy + 1; ny++) {
                        if (nx >= 0 && nx < cols && ny >= 0 && ny < rows) {
                            let cell = grid[nx + ny * cols];
                            for (let j = 0; j < cell.length; j++) {
                                let p2 = cell[j];
                                if (p.id < p2.id) { 
                                    let dx = p2.x - p.x;
                                    let dy = p2.y - p.y;
                                    let distSq = dx*dx + dy*dy;
                                    
                                    if (distSq > 0.0001 && distSq < SPACING_SQ) {
                                        let dist = Math.sqrt(distSq);
                                        let overlap = SPACING - dist;
                                        
                                        // A. PUSH APART (Incompressibility)
                                        let push = (overlap / dist) * 0.45;
                                        let px = dx * push;
                                        let py = dy * push;
                                        
                                        p.x -= px; p.y -= py;
                                        p2.x += px; p2.y += py;

                                        // B. VISCOSITY DAMPING (Fixes Jittering!)
                                        // Forces grouped molecules to share their momentum.
                                        // This makes stacked water act like a heavy, resting solid instead of boiling bouncy balls.
                                        let vxDiff = (p.x - p.oldX) - (p2.x - p2.oldX);
                                        let vyDiff = (p.y - p.oldY) - (p2.y - p2.oldY);
                                        let visc = 0.20; 
                                        
                                        p.oldX += vxDiff * visc; p.oldY += vyDiff * visc;
                                        p2.oldX -= vxDiff * visc; p2.oldY -= vyDiff * visc;
                                    }
                                }
                            }
                        }
                    }
                }
            }
        }

        // 4. Boundary Collisions & Measure Haptic Impact Force
        for (let i = 0; i < PARTICLES; i++) {
            let p = particles[i];
            let bounce = 0.1; // Very low bounce, water should slide, not ricochet

            if (p.x <= R) { 
                p.x = R; p.oldX = p.x + p.vx * bounce; 
                totalWallForce += Math.abs(p.vx); 
            }
            else if (p.x >= width - R) { 
                p.x = width - R; p.oldX = p.x + p.vx * bounce; 
                totalWallForce += Math.abs(p.vx); 
            }
            
            if (p.y <= R) { 
                p.y = R; p.oldY = p.y + p.vy * bounce; 
                totalWallForce += Math.abs(p.vy); 
            }
            else if (p.y >= height - R) { 
                p.y = height - R; 
                p.oldY = p.y + p.vy * bounce; 
                p.oldX = p.x - (p.x - p.oldX) * 0.5; // Friction against the bottom glass
                totalWallForce += Math.abs(p.vy); 
            }
        }

        // 5. EVALUATE DYNAMIC HAPTICS
        const now = Date.now();
        
        // If a massive wave hits the sides (Heavy Slosh)
        if (totalWallForce > 350 && (now - lastSplashTime > 150)) {
            fireHapticTick(); 
            setTimeout(fireHapticTick, 40); // Double tick creates a deeper "thud"
            lastSplashTime = now;
        } 
        // If the water is gently sloshing around (Light bump)
        else if (totalWallForce > 100 && (now - lastSplashTime > 120)) {
            fireHapticTick(); 
            lastSplashTime = now;
        }
    }

    /**
     * --- RENDERING ---
     */
    function draw() {
        ctx.fillStyle = "#050505"; 
        ctx.fillRect(0, 0, width, height);

        // 1. Draw Water Outer Glow (Fuses the molecules together visually)
        ctx.fillStyle = "rgba(10, 120, 255, 0.45)";
        ctx.beginPath();
        for (let i = 0; i < PARTICLES; i++) {
            let p = particles[i];
            ctx.moveTo(p.x + DRAW_R, p.y); 
            ctx.arc(p.x, p.y, DRAW_R, 0, Math.PI * 2);
        }
        ctx.fill();

        // 2. Draw Water Dense Core
        ctx.fillStyle = "rgba(100, 200, 255, 0.6)";
        ctx.beginPath();
        for (let i = 0; i < PARTICLES; i++) {
            let p = particles[i];
            ctx.moveTo(p.x + R, p.y); 
            ctx.arc(p.x, p.y, R, 0, Math.PI * 2);
        }
        ctx.fill();
    }

    let lastTime = 0;
    let accumulator = 0;
    const TIME_STEP = 1000 / 60;

    function loop(time) {
        let dt = time - lastTime;
        lastTime = time;
        if (dt > 100) dt = 100;

        accumulator += dt;
        while (accumulator >= TIME_STEP) {
            updatePhysics();
            accumulator -= TIME_STEP;
        }
        
        draw();
        requestAnimationFrame(loop);
    }

    /**
     * --- STARTUP & DEVICE SENSORS ---
     */
    btn.addEventListener('click', () => {
        // IMPORTANT: We must trigger the first haptic synchronously exactly when the button is tapped. 
        // This "unlocks" the haptics engine for the rest of the session.
        fireHapticTick(); 

        // Handle iOS Permissions
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            DeviceMotionEvent.requestPermission()
                .then(permissionState => {
                    if (permissionState === 'granted') {
                        startSimulation();
                    } else {
                        alert('Permission to access device motion was denied.');
                    }
                })
                .catch(err => alert('Error requesting motion access: ' + err));
        } else {
            // Non-iOS / Android
            startSimulation();
        }
    });

    function startSimulation() {
        ui.style.opacity = "0";
        setTimeout(() => ui.style.display = "none", 400);
        
        initParticles();
        requestAnimationFrame((t) => { lastTime = t; loop(t); });

        // Map physical accelerometer to canvas gravity
        window.addEventListener("devicemotion", (e) => {
            let acc = e.accelerationIncludingGravity;
            if (acc) {
                const weight = 0.22; // The heaviness of the water relative to gravity
                targetGravityX = acc.x * weight; 
                
                // Canvas Y goes down, but upright iPhone Y gravity is negative. So we invert it.
                targetGravityY = -acc.y * weight; 
            }
        });
    }
</script>
</body>
</html>
