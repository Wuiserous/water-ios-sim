<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Realistic Liquid & Pure Haptics</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            overflow: hidden;
            touch-action: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
        }

        /* 
         * METABALL FILTER: Fuses the individual circles into a single body of water.
         */
        #fluid-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: #000;
            filter: blur(12px) contrast(35);
            z-index: 1;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background-color: transparent;
        }

        /* Glass reflections & Cup shadow */
        #glass-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 60px rgba(255, 255, 255, 0.1);
            background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(0,0,0,0) 40%, rgba(255,255,255,0.02) 100%);
            border: 2px solid rgba(255,255,255,0.08);
            pointer-events: none;
            z-index: 5;
        }

        #ui {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(15px);
            transition: opacity 0.4s;
        }

        button {
            padding: 20px 45px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, #007aff, #005bb5);
            color: white;
            box-shadow: 0 10px 30px rgba(0, 122, 255, 0.5);
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.92); }
        
        .hint {
            margin-top: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            text-align: center;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<!-- SILENT HAPTIC HACK for iOS 17+ -->
<!-- Uses the physical Taptic Engine built into the iOS switch element -->
<label style="position:absolute; left:-9999px; opacity: 0.01;">
    <input type="checkbox" switch id="ios-haptic-switch">
</label>

<div id="fluid-layer">
    <canvas id="sim"></canvas>
</div>
<div id="glass-overlay"></div>

<div id="ui">
    <button id="btn-start">Pour Water</button>
    <div class="hint">Please ensure Silent Mode is OFF<br>for haptic vibrations to work.</div>
</div>

<script>
    /**
     * --- PURE PHYSICAL HAPTICS ENGINE ---
     */
    const iosSwitch = document.getElementById('ios-haptic-switch');
    let lastHapticTime = 0;

    function triggerVibration(intensity = 'light') {
        const now = Date.now();
        
        // Debounce to prevent the haptic engine from freezing (buzzing)
        const cooldown = intensity === 'heavy' ? 120 : 60;
        if (now - lastHapticTime < cooldown) return;
        lastHapticTime = now;

        // 1. Standard Android Web Vibration
        if (navigator.vibrate) {
            navigator.vibrate(intensity === 'heavy' ? 25 : 10);
        }
        
        // 2. iOS Taptic Engine Hack (No sound, pure physical bump)
        if (iosSwitch) {
            iosSwitch.click(); 
            // If it's a heavy splash, trigger a double-click for a deeper feeling
            if (intensity === 'heavy') {
                setTimeout(() => iosSwitch.click(), 40);
            }
        }
    }

    /**
     * --- TUNED REALISTIC FLUID ENGINE ---
     */
    const canvas = document.getElementById('sim');
    const ctx = canvas.getContext('2d', { alpha: false });
    const ui = document.getElementById('ui');
    const btn = document.getElementById('btn-start');

    const PARTICLES = 600;      
    const R = 8.5;                
    const SPACING = R * 2.2;    
    const SPACING_SQ = SPACING * SPACING;
    const COHESION_DIST = SPACING * 1.6; 
    const COHESION_SQ = COHESION_DIST * COHESION_DIST;
    const DRAW_R = R * 2.8;     

    let width, height;
    let particles = [];
    let grid =[];
    let cols, rows;
    let cellSize = COHESION_DIST;

    let targetGravityX = 0;
    let targetGravityY = 0.5; // Lower default gravity for natural resting speed
    let gravityX = 0;
    let gravityY = 0.5;

    class Particle {
        constructor(id, x, y) {
            this.id = id;
            this.x = x; this.y = y;
            this.oldX = x; this.oldY = y;
            this.vx = 0; this.vy = 0;
        }
    }

    function initParticles() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        
        cols = Math.ceil(width / cellSize);
        rows = Math.ceil(height / cellSize);
        grid = new Array(cols * rows);
        for(let i = 0; i < grid.length; i++) grid[i] = [];

        particles =[];
        const spawnCols = Math.max(5, Math.floor(width / SPACING) - 3);
        const startX = (width - (spawnCols * SPACING)) / 2;
        const startY = 80; 

        for (let i = 0; i < PARTICLES; i++) {
            let x = startX + (i % spawnCols) * SPACING + (Math.random() - 0.5);
            let y = startY + Math.floor(i / spawnCols) * SPACING;
            particles.push(new Particle(i, x, y));
        }
    }

    window.addEventListener('resize', () => { if(particles.length > 0) initParticles(); });

    /**
     * --- PHYSICS LOOP ---
     */
    function updatePhysics() {
        // Natural inertia: The water takes a split second to react to gravity shifting
        gravityX += (targetGravityX - gravityX) * 0.15;
        gravityY += (targetGravityY - gravityY) * 0.15;

        let totalWallForce = 0;
        let flowingForce = 0;

        // 1. Integration (Move particles)
        for (let i = 0; i < PARTICLES; i++) {
            let p = particles[i];
            
            p.vx = p.x - p.oldX;
            p.vy = p.y - p.oldY;

            flowingForce += Math.abs(p.vx) + Math.abs(p.vy);

            // Sleep threshold (prevents jitter when phone is perfectly still)
            if (p.vx * p.vx + p.vy * p.vy < 0.008) {
                p.vx = 0; p.vy = 0;
                p.oldX = p.x; p.oldY = p.y;
            }

            // Fluid Drag (Internal Friction). Slows the water down naturally.
            p.vx *= 0.992; 
            p.vy *= 0.992;
            
            p.vx += gravityX;
            p.vy += gravityY;
            
            p.oldX = p.x;
            p.oldY = p.y;
            p.x += p.vx;
            p.y += p.vy;
        }

        // 2. Spatial Grid Hashing
        for(let i = 0; i < grid.length; i++) grid[i].length = 0;
        for(let i = 0; i < PARTICLES; i++) {
            let p = particles[i];
            let cx = Math.floor(p.x / cellSize);
            let cy = Math.floor(p.y / cellSize);
            if (cx < 0) cx = 0; if (cx >= cols) cx = cols - 1;
            if (cy < 0) cy = 0; if (cy >= rows) cy = rows - 1;
            grid[cx + cy * cols].push(p);
        }

        // 3. Fluid Mechanics Constraints (Runs 4 times for solid fluid behavior)
        for (let iter = 0; iter < 4; iter++) {
            for (let i = 0; i < PARTICLES; i++) {
                let p = particles[i];
                let cx = Math.floor(p.x / cellSize);
                let cy = Math.floor(p.y / cellSize);

                for (let nx = cx - 1; nx <= cx + 1; nx++) {
                    for (let ny = cy - 1; ny <= cy + 1; ny++) {
                        if (nx >= 0 && nx < cols && ny >= 0 && ny < rows) {
                            let cell = grid[nx + ny * cols];
                            for (let j = 0; j < cell.length; j++) {
                                let p2 = cell[j];
                                if (p.id < p2.id) { 
                                    let dx = p2.x - p.x;
                                    let dy = p2.y - p.y;
                                    let distSq = dx*dx + dy*dy;
                                    
                                    if (distSq > 0.0001 && distSq < COHESION_SQ) {
                                        let dist = Math.sqrt(distSq);
                                        let nxDir = dx / dist;
                                        let nyDir = dy / dist;

                                        if (dist < SPACING) {
                                            // INCOMPRESSIBILITY (Push Apart)
                                            let push = (SPACING - dist) * 0.45;
                                            p.x -= nxDir * push; p.y -= nyDir * push;
                                            p2.x += nxDir * push; p2.y += nyDir * push;

                                            // VISCOSITY (Keeps water acting like a unified body)
                                            let visc = 0.18; 
                                            let vxDiff = (p.x - p.oldX) - (p2.x - p2.oldX);
                                            let vyDiff = (p.y - p.oldY) - (p2.y - p2.oldY);
                                            
                                            p.oldX += vxDiff * visc; p.oldY += vyDiff * visc;
                                            p2.oldX -= vxDiff * visc; p2.oldY -= vyDiff * visc;
                                        } 
                                        else {
                                            // SURFACE TENSION (Pull together into distinct blobs)
                                            let pull = (dist - SPACING) * 0.035; 
                                            p.x += nxDir * pull; p.y += nyDir * pull;
                                            p2.x -= nxDir * pull; p2.y -= nyDir * pull;
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
            }
        }

        // 4. Boundary Engine (Glass Friction)
        for (let i = 0; i < PARTICLES; i++) {
            let p = particles[i];
            
            // Apply high friction when sliding against the "glass" walls
            const glassFriction = 0.5;

            if (p.x <= R) { 
                p.x = R; 
                p.oldY = p.y - (p.y - p.oldY) * glassFriction; // Slows downward slide
                p.oldX = p.x; 
                totalWallForce += Math.abs(p.vx); 
            }
            else if (p.x >= width - R) { 
                p.x = width - R; 
                p.oldY = p.y - (p.y - p.oldY) * glassFriction; 
                p.oldX = p.x; 
                totalWallForce += Math.abs(p.vx); 
            }
            
            if (p.y <= R) { 
                p.y = R; 
                p.oldX = p.x - (p.x - p.oldX) * glassFriction;
                p.oldY = p.y; 
                totalWallForce += Math.abs(p.vy); 
            }
            else if (p.y >= height - R) { 
                p.y = height - R; 
                p.oldX = p.x - (p.x - p.oldX) * glassFriction; // Sliding along bottom
                p.oldY = p.y; 
                totalWallForce += Math.abs(p.vy); 
            }
        }

        // 5. EVALUATE WATER HAPTICS
        // Heavy Splash
        if (totalWallForce > 450) {
            triggerVibration('heavy');
        } 
        // Water actively flowing/sliding down the screen
        else if (flowingForce > 2500 && totalWallForce > 50) {
            triggerVibration('light');
        }
    }

    /**
     * --- RENDERING ---
     */
    function draw() {
        ctx.fillStyle = "#000000"; 
        ctx.fillRect(0, 0, width, height);

        // Water color. The CSS metaball filter merges these into perfect liquid.
        ctx.fillStyle = "#0088ff"; 
        ctx.beginPath();
        for (let i = 0; i < PARTICLES; i++) {
            let p = particles[i];
            ctx.moveTo(p.x + DRAW_R, p.y); 
            ctx.arc(p.x, p.y, DRAW_R, 0, Math.PI * 2);
        }
        ctx.fill();
    }

    // 60Hz Physics Step
    let lastTime = 0;
    let accumulator = 0;
    const TIME_STEP = 1000 / 60; 

    function loop(time) {
        let dt = time - lastTime;
        lastTime = time;
        if (dt > 100) dt = 100; // Cap dt to prevent explosions on lag

        accumulator += dt;
        while (accumulator >= TIME_STEP) {
            updatePhysics();
            accumulator -= TIME_STEP;
        }
        
        draw();
        requestAnimationFrame(loop);
    }

    /**
     * --- STARTUP & SENSORS ---
     */
    btn.addEventListener('click', () => {
        // Unlock haptics
        triggerVibration('heavy');

        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            DeviceMotionEvent.requestPermission()
                .then(state => {
                    if (state === 'granted') startSimulation();
                    else alert('Motion access denied.');
                })
                .catch(err => alert('Error: ' + err));
        } else {
            startSimulation();
        }
    });

    function startSimulation() {
        ui.style.opacity = "0";
        setTimeout(() => ui.style.display = "none", 300);
        
        initParticles();
        requestAnimationFrame((t) => { lastTime = t; loop(t); });

        window.addEventListener("devicemotion", (e) => {
            let acc = e.accelerationIncludingGravity;
            if (acc) {
                // Reduced weight to 0.20 for a highly realistic, slightly slowed water flow.
                const weight = 0.20; 
                targetGravityX = acc.x * weight; 
                targetGravityY = -acc.y * weight; 
            }
        });
    }
</script>
</body>
</html>
