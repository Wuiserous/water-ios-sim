<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realistic Gyro Water</title>

<style>
body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: sans-serif;
    overflow: hidden;
}

#container {
    position: relative;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    border-radius: 20px;
}

canvas {
    background: linear-gradient(to bottom, #1b1b1b 0%, #0d0d0d 100%);
    border-radius: 20px;
    display: block;
    border: 2px solid #333;
}

button {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 16px 24px;
    font-size: 16px;
    border: none;
    border-radius: 12px;
    background: #4da6ff;
    color: white;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 4px 12px rgba(77, 166, 255, 0.4);
    transition: transform 0.1s;
}

button:active {
    transform: translate(-50%, -50%) scale(0.95);
}
</style>
</head>
<body>

<div id="container">
    <canvas id="c" width="350" height="500"></canvas>
    <button id="start">Enable Water</button>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const W = canvas.width;
const H = canvas.height;

// --- Physics Configuration ---
const POINTS = 100;           // More points for smoother waves
const SPRING_K = 0.0025;      // Low value = loose water (sloshy). High = stiff jello.
const DAMPING = 0.03;         // Friction. Lower = waves last longer.
const SPREAD = 0.2;           // How fast waves travel laterally
const INERTIA_SCALE = 15.0;   // How much phone movement "throws" the water

// --- State Variables ---
let waterH = [];      // Height of water columns
let waterV = [];      // Velocity of water columns
let baseLevel = H * 0.5;

// Initialize water
for (let i = 0; i < POINTS; i++) {
    waterH[i] = baseLevel;
    waterV[i] = 0;
}

let currentTilt = 0;
let smoothedTilt = 0;
let prevTilt = 0;

// Button Logic
const btn = document.getElementById("start");
btn.onclick = async () => {
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === "function") {
        try {
            let p = await DeviceOrientationEvent.requestPermission();
            if (p === "granted") {
                window.addEventListener("deviceorientation", handleOrientation);
                btn.style.display = "none";
            } else {
                alert("Permission denied. Cant simulate physics.");
            }
        } catch (e) {
            alert(e);
        }
    } else {
        // Non-iOS or older devices
        window.addEventListener("deviceorientation", handleOrientation);
        btn.style.display = "none";
    }
};

function handleOrientation(e) {
    // Gamma is usually left/right tilt (-90 to 90)
    // We clamp it slightly to prevent extreme edge cases
    let g = e.gamma || 0;
    if(g > 90) g = 90;
    if(g < -90) g = -90;
    
    // Smooth the input slightly to reduce sensor jitter
    currentTilt = g;
}

function physics() {
    // 1. Calculate Tilt Dynamics
    // We use Linear Interpolation (Lerp) to smooth the sensor data
    smoothedTilt += (currentTilt - smoothedTilt) * 0.1;
    
    // Calculate the speed of rotation (Angular Velocity)
    // This is crucial: moving the phone quickly creates momentum
    let tiltDelta = smoothedTilt - prevTilt;
    prevTilt = smoothedTilt;

    // Convert angle to a slope factor
    // tan() gives physically accurate slope for a given angle
    let slope = Math.tan(smoothedTilt * Math.PI / 180);

    // 2. Apply Forces to each point
    for (let i = 0; i < POINTS; i++) {
        // --- A. Target Height Calculation (Gravity) ---
        // If the cup is tilted, water wants to form a line perpendicular to gravity.
        // We calculate that ideal line relative to the center of the screen.
        let distanceFromCenter = (i - POINTS / 2) * (W / POINTS);
        let targetHeight = baseLevel + (distanceFromCenter * slope);

        // --- B. Spring Force (Gravity Pull) ---
        // Pull the water towards that ideal line, but with a spring constant (k).
        let extension = waterH[i] - targetHeight;
        let force = -SPRING_K * extension;

        // --- C. Inertia (The "Throw" Effect) ---
        // If the phone rotates quickly, add velocity to the water.
        // Tilting right throws water to the left (relative to screen coords) and vice versa.
        // We scale this by distance from center to simulate centrifugal-like effects.
        let inertiaForce = tiltDelta * INERTIA_SCALE * (i - POINTS/2) / POINTS;
        
        // Apply forces to velocity
        waterV[i] += force - inertiaForce;
        
        // --- D. Damping (Friction) ---
        waterV[i] *= (1 - DAMPING);
        
        // Update position
        waterH[i] += waterV[i];
    }

    // 3. Wave Propagation (Spread)
    // This passes energy between neighbors 
    // We run this multiple times per frame for stability
    for(let j = 0; j < 4; j++) {
        for (let i = 0; i < POINTS; i++) {
            if (i > 0) {
                // Pull neighbor towards me
                let leftDelta = waterH[i] - waterH[i - 1];
                waterV[i - 1] += leftDelta * SPREAD;
                waterV[i] -= leftDelta * SPREAD; // Newton's 3rd law
            }
            if (i < POINTS - 1) {
                let rightDelta = waterH[i] - waterH[i + 1];
                waterV[i + 1] += rightDelta * SPREAD;
                waterV[i] -= rightDelta * SPREAD;
            }
        }
    }
    
    // 4. Boundary "Splashing"
    // If water hits the ceiling or floor, bounce it
    for(let i=0; i<POINTS; i++){
        if(waterH[i] > H) { waterH[i] = H; waterV[i] *= -0.5; }
        if(waterH[i] < 0) { waterH[i] = 0; waterV[i] *= -0.5; }
    }
}

function draw() {
    ctx.clearRect(0, 0, W, H);

    // Create Gradient for water
    let grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, "rgba(60, 160, 255, 0.8)"); // Top lighter
    grad.addColorStop(1, "rgba(20, 80, 200, 0.9)");  // Bottom darker

    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(0, H);

    // Draw the top surface curve
    for (let i = 0; i < POINTS; i++) {
        let x = i * (W / (POINTS - 1));
        let y = waterH[i];
        ctx.lineTo(x, y);
    }

    ctx.lineTo(W, H); // Bottom right
    ctx.lineTo(0, H); // Bottom left
    ctx.closePath();
    ctx.fill();

    // Highlight line on top
    ctx.beginPath();
    for (let i = 0; i < POINTS; i++) {
        let x = i * (W / (POINTS - 1));
        let y = waterH[i];
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
    ctx.lineWidth = 3;
    ctx.stroke();
}

function loop() {
    physics();
    draw();
    requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
