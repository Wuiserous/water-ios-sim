<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hyper-Realistic Liquid & Haptics</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            overflow: hidden;
            touch-action: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
        }

        /* 
         * THE METABALL FLUID RENDERER
         * This combination of blur and extreme contrast forces the drawn circles 
         * to visually melt and merge together, creating realistic surface tension and blobs.
         */
        #fluid-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: #000;
            filter: blur(12px) contrast(40);
            z-index: 1;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background-color: transparent;
        }

        /* Simulates looking inside a glass cup with reflections */
        #glass-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 60px rgba(255, 255, 255, 0.15);
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0) 50%, rgba(255,255,255,0.02) 100%);
            border: 2px solid rgba(255,255,255,0.08);
            pointer-events: none;
            z-index: 5;
        }

        /* UI Styling */
        #ui {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            transition: opacity 0.4s;
        }

        button {
            padding: 22px 50px;
            font-size: 24px;
            font-weight: 800;
            border-radius: 50px;
            border: none;
            background: #007aff;
            color: white;
            box-shadow: 0 10px 40px rgba(0, 122, 255, 0.6);
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.92); }
        
        .hint {
            margin-top: 24px;
            color: rgba(255,255,255,0.7);
            font-size: 15px;
            text-align: center;
            line-height: 1.5;
        }

        /* iOS 17+ Haptic Trigger Hack */
        .ios-haptic-switch {
            position: absolute;
            left: -9999px;
            opacity: 0.01;
        }
    </style>
</head>
<body>

<!-- The invisible trigger for iOS Safari Web Haptics -->
<input type="checkbox" switch id="ios-haptic-hack" class="ios-haptic-switch">

<!-- The Gooey Fluid Render Layer -->
<div id="fluid-layer">
    <canvas id="sim"></canvas>
</div>

<!-- Lighting/Glass overlay -->
<div id="glass-overlay"></div>

<div id="ui">
    <button id="btn-start">Pour Water</button>
    <div class="hint">1. Turn OFF Silent Mode<br>2. Turn OFF Portrait Lock</div>
</div>

<script>
    /**
     * --- CONTINUOUS HAPTICS ENGINE ---
     */
    const iosSwitch = document.getElementById('ios-haptic-hack');

    function fireHapticTick() {
        if (navigator.vibrate) navigator.vibrate(12);
        if (iosSwitch) iosSwitch.click(); // Triggers iOS physical Taptic bump
    }

    let lastImpactTime = 0;
    let lastFlowTime = 0;

    /**
     * --- FLUID PHYSICS CONFIGURATION ---
     */
    const canvas = document.getElementById('sim');
    const ctx = canvas.getContext('2d', { alpha: false });
    const ui = document.getElementById('ui');
    const btn = document.getElementById('btn-start');

    const PARTICLES = 650;      // Optimal density for gooey rendering
    const R = 8;                // Collision radius
    const SPACING = R * 2.2;    // Resting distance
    const SPACING_SQ = SPACING * SPACING;
    const COHESION_DIST = SPACING * 1.6; // How far water reaches to pull other water
    const COHESION_SQ = COHESION_DIST * COHESION_DIST;
    
    // We draw the circles very large so the CSS Blur/Contrast melts them together
    const DRAW_R = R * 2.8;     

    let width, height;
    let particles = [];
    let grid =[];
    let cols, rows;
    let cellSize = COHESION_DIST;

    // Gravity Dynamics
    let targetGravityX = 0;
    let targetGravityY = 0.9;
    let gravityX = 0;
    let gravityY = 0.9;

    class Particle {
        constructor(id, x, y) {
            this.id = id;
            this.x = x;
            this.y = y;
            this.oldX = x;
            this.oldY = y;
            this.vx = 0;
            this.vy = 0;
        }
    }

    function initParticles() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        
        cols = Math.ceil(width / cellSize);
        rows = Math.ceil(height / cellSize);
        grid = new Array(cols * rows);
        for(let i = 0; i < grid.length; i++) grid[i] = [];

        particles =[];
        const spawnCols = Math.max(5, Math.floor(width / SPACING) - 4);
        const startX = (width - (spawnCols * SPACING)) / 2;
        const startY = 60; // Spawn near the top to see the drop

        for (let i = 0; i < PARTICLES; i++) {
            let x = startX + (i % spawnCols) * SPACING + (Math.random() - 0.5);
            let y = startY + Math.floor(i / spawnCols) * SPACING;
            particles.push(new Particle(i, x, y));
        }
    }

    window.addEventListener('resize', () => { 
        if(particles.length > 0) initParticles();
    });

    /**
     * --- PHYSICS ENGINE LOOP ---
     */
    function updatePhysics() {
        // Inertia tracking
        gravityX += (targetGravityX - gravityX) * 0.15;
        gravityY += (targetGravityY - gravityY) * 0.15;

        let totalKineticEnergy = 0;
        let totalWallForce = 0;

        // 1. Integration (Move particles)
        for (let i = 0; i < PARTICLES; i++) {
            let p = particles[i];
            
            p.vx = p.x - p.oldX;
            p.vy = p.y - p.oldY;

            totalKineticEnergy += Math.abs(p.vx) + Math.abs(p.vy);

            // Wake/Sleep Threshold (fixes jittering when resting)
            if (p.vx * p.vx + p.vy * p.vy < 0.01) {
                p.vx = 0; p.vy = 0;
                p.oldX = p.x; p.oldY = p.y;
            }

            p.vx *= 0.999; // Low air resistance
            p.vy *= 0.999;
            
            p.vx += gravityX;
            p.vy += gravityY;
            
            p.oldX = p.x;
            p.oldY = p.y;
            p.x += p.vx;
            p.y += p.vy;
        }

        // 2. Spatial Grid
        for(let i = 0; i < grid.length; i++) grid[i].length = 0;
        for(let i = 0; i < PARTICLES; i++) {
            let p = particles[i];
            let cx = Math.floor(p.x / cellSize);
            let cy = Math.floor(p.y / cellSize);
            
            if (cx < 0) cx = 0; if (cx >= cols) cx = cols - 1;
            if (cy < 0) cy = 0; if (cy >= rows) cy = rows - 1;
            
            grid[cx + cy * cols].push(p);
        }

        // 3. Fluid Constraints (Cohesion, Repulsion, Viscosity)
        for (let iter = 0; iter < 3; iter++) {
            for (let i = 0; i < PARTICLES; i++) {
                let p = particles[i];
                let cx = Math.floor(p.x / cellSize);
                let cy = Math.floor(p.y / cellSize);

                for (let nx = cx - 1; nx <= cx + 1; nx++) {
                    for (let ny = cy - 1; ny <= cy + 1; ny++) {
                        if (nx >= 0 && nx < cols && ny >= 0 && ny < rows) {
                            let cell = grid[nx + ny * cols];
                            for (let j = 0; j < cell.length; j++) {
                                let p2 = cell[j];
                                if (p.id < p2.id) { 
                                    let dx = p2.x - p.x;
                                    let dy = p2.y - p.y;
                                    let distSq = dx*dx + dy*dy;
                                    
                                    if (distSq > 0.0001 && distSq < COHESION_SQ) {
                                        let dist = Math.sqrt(distSq);
                                        let nxDir = dx / dist;
                                        let nyDir = dy / dist;

                                        if (dist < SPACING) {
                                            // A. INCOMPRESSIBILITY (Push Apart)
                                            let overlap = SPACING - dist;
                                            let push = overlap * 0.45;
                                            
                                            p.x -= nxDir * push; p.y -= nyDir * push;
                                            p2.x += nxDir * push; p2.y += nyDir * push;

                                            // B. VISCOSITY (Share momentum)
                                            let vxDiff = (p.x - p.oldX) - (p2.x - p2.oldX);
                                            let vyDiff = (p.y - p.oldY) - (p2.y - p2.oldY);
                                            let visc = 0.22; 
                                            
                                            p.oldX += vxDiff * visc; p.oldY += vyDiff * visc;
                                            p2.oldX -= vxDiff * visc; p2.oldY -= vyDiff * visc;
                                        } 
                                        else {
                                            // C. SURFACE TENSION / COHESION (Pull Together)
                                            // This prevents the "sand" look and forms water blobs
                                            let pull = (dist - SPACING) * 0.035; 
                                            p.x += nxDir * pull; p.y += nyDir * pull;
                                            p2.x -= nxDir * pull; p2.y -= nyDir * pull;
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
            }
        }

        // 4. Boundary Collisions & Measure Wall Impact
        for (let i = 0; i < PARTICLES; i++) {
            let p = particles[i];
            let bounce = 0.1; // Smooth slide, no bouncy rubber

            if (p.x <= R) { 
                p.x = R; p.oldX = p.x + p.vx * bounce; 
                totalWallForce += Math.abs(p.vx); 
            }
            else if (p.x >= width - R) { 
                p.x = width - R; p.oldX = p.x + p.vx * bounce; 
                totalWallForce += Math.abs(p.vx); 
            }
            
            if (p.y <= R) { 
                p.y = R; p.oldY = p.y + p.vy * bounce; 
                totalWallForce += Math.abs(p.vy); 
            }
            else if (p.y >= height - R) { 
                p.y = height - R; 
                p.oldY = p.y + p.vy * bounce; 
                p.oldX = p.x - (p.x - p.oldX) * 0.6; // High friction against the bottom
                totalWallForce += Math.abs(p.vy); 
            }
        }

        // 5. EMBEDDED HAPTICS LOGIC
        const now = Date.now();
        
        // A. Heavy Impact (Splash)
        // Triggered when a large wave hits the walls. Double tick creates a deep "Thud".
        if (totalWallForce > 350 && (now - lastImpactTime > 180)) {
            fireHapticTick(); 
            setTimeout(fireHapticTick, 35); 
            lastImpactTime = now;
        } 
        
        // B. Continuous Flowing (Slosh / Slide)
        // Triggered continuously while the water mass is moving actively.
        // The 85ms gap creates a continuous "rumbling" feeling in your hands.
        if (totalKineticEnergy > 2000 && (now - lastFlowTime > 85) && (now - lastImpactTime > 100)) {
            fireHapticTick();
            lastFlowTime = now;
        }
    }

    /**
     * --- RENDERING ---
     */
    function draw() {
        // Clear background to absolute black (Required for Contrast filter to work)
        ctx.fillStyle = "#000000"; 
        ctx.fillRect(0, 0, width, height);

        // Draw molecules in a bright blue.
        // Because of the CSS contrast() and blur() on the parent div, 
        // these circles will melt together into a solid liquid body!
        ctx.fillStyle = "#1e90ff"; 
        ctx.beginPath();
        for (let i = 0; i < PARTICLES; i++) {
            let p = particles[i];
            // Move cursor so lines don't connect between molecules
            ctx.moveTo(p.x + DRAW_R, p.y); 
            ctx.arc(p.x, p.y, DRAW_R, 0, Math.PI * 2);
        }
        ctx.fill();
    }

    let lastTime = 0;
    let accumulator = 0;
    const TIME_STEP = 1000 / 60;

    function loop(time) {
        let dt = time - lastTime;
        lastTime = time;
        if (dt > 100) dt = 100;

        accumulator += dt;
        while (accumulator >= TIME_STEP) {
            updatePhysics();
            accumulator -= TIME_STEP;
        }
        
        draw();
        requestAnimationFrame(loop);
    }

    /**
     * --- STARTUP & DEVICE SENSORS ---
     */
    btn.addEventListener('click', () => {
        // Synchronously unlock the Haptic engine upon user gesture
        fireHapticTick(); 
        setTimeout(fireHapticTick, 50);

        // Handle iOS Permissions
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            DeviceMotionEvent.requestPermission()
                .then(permissionState => {
                    if (permissionState === 'granted') {
                        startSimulation();
                    } else {
                        alert('Permission to access device motion was denied.');
                    }
                })
                .catch(err => alert('Error requesting motion access: ' + err));
        } else {
            // Non-iOS / Android
            startSimulation();
        }
    });

    function startSimulation() {
        ui.style.opacity = "0";
        setTimeout(() => ui.style.display = "none", 400);
        
        initParticles();
        requestAnimationFrame((t) => { lastTime = t; loop(t); });

        // Map physical accelerometer to canvas gravity
        window.addEventListener("devicemotion", (e) => {
            let acc = e.accelerationIncludingGravity;
            if (acc) {
                const weight = 0.28; // Adjust to make the fluid feel heavier or lighter
                targetGravityX = acc.x * weight; 
                targetGravityY = -acc.y * weight; // iOS Y-axis is inverted relative to canvas
            }
        });
    }
</script>
</body>
</html>
